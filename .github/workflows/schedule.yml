name: Daily NewsBot

on:
  schedule:
    # 每日 UTC 00:00（台灣時間 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-newsbot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Run NewsBot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_AI: ${{ secrets.TELEGRAM_CHANNEL_AI }}
          TELEGRAM_CHANNEL_INVEST: ${{ secrets.TELEGRAM_CHANNEL_INVEST }}
          TELEGRAM_CHANNEL_CRYPTO: ${{ secrets.TELEGRAM_CHANNEL_CRYPTO }}
          TELEGRAM_CHANNEL_GEO: ${{ secrets.TELEGRAM_CHANNEL_GEO }}
        run: uv run python main.py

      - name: Commit deduplication data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sent_posts.json
          git diff --cached --quiet || git commit -m "chore: update sent_posts.json [skip ci]"
          git push
